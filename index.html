<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>No Maybe Yes</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              fira: [
                '"Fira Code"',
                "ui-monospace",
                "SFMono-Regular",
                "Menlo",
                "Monaco",
                "Consolas",
                "monospace",
              ],
            },
          },
        },
      };
    </script>

    <style type="text/tailwindcss">
      @theme {
        --animate-blink: blink 1.8s ease-in-out infinite;
        --animate-keypress: keypress 1.4s ease-out forwards;

        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }

        @keyframes keypress {
          0% { transform: translateY(-2px); opacity: 0; }
          20% { transform: translateY(0); opacity: 1; }
          70% { opacity: 1; }
          100% { opacity: 0; }
        }
      }
    </style>
  </head>

  <!-- Google tag (gtag.js) -->
  <script
    async
    src="https://www.googletagmanager.com/gtag/js?id=G-6V0KQLF8N2"
  ></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "G-6V0KQLF8N2");
  </script>

  <body
    class="flex min-h-screen items-center justify-center overflow-hidden bg-[#efedea] p-4 font-fira text-neutral-900 sm:p-6"
  >
    <main
      class="flex flex-col gap-5 w-full max-w-3xl px-6 py-10 sm:px-12 sm:py-16 text-center"
    >
      <h1
        class="whitespace-nowrap text-5xl font-extrabold leading-none tracking-tighter sm:text-7xl md:text-8xl"
      >
        No. Maybe, Yes.
      </h1>

      <p class="text-base leading-relaxed sm:text-2xl">
        <span id="typed"></span>
        <span
          class="cursor ml-1 inline-block h-[0.85em] w-[0.45em] animate-blink bg-neutral-900 align-middle"
        ></span>
        <span
          id="enter-key"
          class="ml-2 hidden items-center gap-1 align-middle text-[0.6em] font-medium tracking-wide text-neutral-900"
        >
          <span class="text-[1.2em] leading-none">&#9166;</span>
          <span>Enter</span>
        </span>
      </p>
    </main>

    <script>
      const phrases = [
        "A Software Exploration Lab.",
        "An AI Exploration Lab.",
        "A Design Exploration Lab.",
        "Prototypes. Products. Findings.",
      ];

      const typed = document.getElementById("typed");
      const cursor = document.querySelector(".cursor");
      const enterKey = document.getElementById("enter-key");

      let phraseIndex = 0;
      let charIndex = 0;
      let deleting = false;

      function tick() {
        const current = phrases[phraseIndex];

        if (!deleting) {
          charIndex++;
          typed.textContent = current.substring(0, charIndex);
        } else {
          charIndex--;
          typed.textContent = current.substring(0, charIndex);
        }

        const jitter = (Math.random() - 0.5) * 30;
        let speed = deleting ? 28 : 70 + jitter;

        if (!deleting && charIndex === current.length) {
          if (phraseIndex === phrases.length - 1) {
            const enterDelay = 500;
            const enterDuration = 1400;

            setTimeout(() => {
              cursor.style.display = "none";
              enterKey.classList.remove("hidden");
              enterKey.classList.add("inline-flex", "animate-keypress");
            }, enterDelay);

            setTimeout(() => {
              enterKey.style.display = "none";
            }, enterDelay + enterDuration);

            return;
          }

          speed = 1400;
          deleting = true;
        }

        if (deleting && charIndex === 0) {
          deleting = false;
          phraseIndex++;
          speed = 350;
        }

        setTimeout(tick, speed);
      }

      tick();
    </script>
  </body>
</html>
