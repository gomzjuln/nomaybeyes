<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>No. Maybe, Yes.</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;800;900&display=swap");

      body {
        font-family: "Fira Sans", sans-serif;
      }

      .cursor {
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>

  <body
    class="flex min-h-screen items-center justify-center overflow-hidden bg-[#f4f1eb] p-4 text-neutral-950 sm:p-6"
  >
    <main
      class="flex w-full max-w-3xl flex-col gap-5 px-6 py-10 text-center sm:px-12 sm:py-16"
    >
      <h1
        class="whitespace-nowrap text-5xl font-black tracking-tighter sm:text-7xl md:text-8xl"
      >
        No. Maybe, Yes.
      </h1>

      <p class="text-base leading-relaxed sm:text-2xl">
        <span id="typed"></span>

        <span
          class="cursor ml-1 inline-block h-[0.85em] w-[0.45em] bg-neutral-950 align-middle"
        ></span>
      </p>
    </main>

    <script>
      const phrases = [
        "A Software Exploration Lab.",
        "An AI Exploration Lab.",
        "A Design Exploration Lab.",
        "Prototypes. Products. Findings.",
      ];

      const typed = document.getElementById("typed");
      const cursor = document.querySelector(".cursor");

      let phraseIndex = 0;
      let charIndex = 0;
      let deleting = false;

      function tick() {
        const current = phrases[phraseIndex];

        if (!deleting) {
          charIndex++;
          typed.textContent = current.substring(0, charIndex);
        } else {
          charIndex--;
          typed.textContent = current.substring(0, charIndex);
        }

        let speed = deleting ? 35 : 65;

        if (!deleting && charIndex === current.length) {
          if (phraseIndex === phrases.length - 1) {
            setTimeout(() => {
              cursor.style.display = "none";
            }, 500);

            return;
          }

          speed = 1400;
          deleting = true;
        }

        if (deleting && charIndex === 0) {
          deleting = false;
          phraseIndex++;
          speed = 350;
        }

        setTimeout(tick, speed);
      }

      tick();
    </script>
  </body>
</html>
